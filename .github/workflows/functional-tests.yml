name: Functional Tests

on:
  # Trigger when a status check is posted (OpenShift CI completion)
  status:
  # Allow manual trigger with custom image tag
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (e.g., stable, stable-2.1)'
        required: true
        type: string

jobs:
  # Extract image information from the trigger event
  setup:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    # Only run for workflow_dispatch or relevant status events
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'status' &&
       startsWith(github.ref, 'refs/heads/stable') &&
       github.event.state == 'success' &&
       contains(github.event.context, 'stable-image-mirror'))
    outputs:
      image_tag: ${{ steps.set_image_tag.outputs.tag }}
      branch_name: ${{ steps.get_branch_info.outputs.branch_name }}
    steps:
      - name: Get branch information
        if: github.event_name == 'status'
        id: get_branch_info
        run: |
          BRANCH_NAME=$(echo "${{ github.ref }}" | cut -d'/' -f3-)
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "Branch: ${BRANCH_NAME}"

      - name: Set image tag
        id: set_image_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.get_branch_info.outputs.branch_name }}" >> $GITHUB_OUTPUT
          fi

  # Full functional tests
  functional-tests-all:
    name: Functional Tests (Full)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull image from Quay.io
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          FULL_IMAGE="quay.io/opendatahub/openvino_model_server:${IMAGE_TAG}"
          echo "Pulling image: ${FULL_IMAGE}"
          docker pull ${FULL_IMAGE}
          docker tag ${FULL_IMAGE} openvino/model_server:latest

      - name: Run full functional tests
        env:
          IMAGE: openvino/model_server:latest
        run: |
          make test_functional
