name: Functional Tests

on:
  # Trigger when a status check is posted (OpenShift CI completion)
  status:
  # Allow manual trigger with custom image tag
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (e.g., stable, stable-2.1)'
        required: true
        type: string
      source_ref:
        description: 'Git ref to checkout for tests (branch, tag, or commit SHA)'
        required: true
        type: string

jobs:
  # Extract image information from the trigger event
  setup:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    # Only run for workflow_dispatch or relevant status events
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'status' &&
       github.event.state == 'success' &&
       contains(github.event.context, 'ci/prow/image-mirror-stable'))
    outputs:
      branch_name: ${{ steps.extract_branch_name.outputs.branch_name }}
      image_tag: ${{ steps.set_image_tag.outputs.image_tag }}
      source_ref: ${{ steps.set_source_ref.outputs.source_ref }}
    steps:
      - name: Extract branch name
        id: extract_branch_name
        if: github.event_name == 'status'
        run: |
          # Extract branch name from context: ci/prow/image-mirror-stable -> stable
          CONTEXT="${{ github.event.context }}"
          BRANCH_NAME="${CONTEXT#ci/prow/image-mirror-}"  # Remove ci/prow/image-mirror- prefix
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "Branch name: ${BRANCH_NAME}"
      - name: Set image tag
        id: set_image_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            COMMIT_SHA="${{ github.event.sha }}"
            TAG="${{ steps.extract_branch_name.outputs.branch_name }}-${COMMIT_SHA:0:7}"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"
      - name: Set source ref
        id: set_source_ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.event.inputs.source_ref }}"
          else
            REF="${{ github.event.sha }}"
          fi
          echo "source_ref=${REF}" >> $GITHUB_OUTPUT
          echo "Source ref: ${REF}"

  # Full functional tests
  functional-tests-all:
    name: Functional Tests (Full)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Post pending status to commit
        if: github.event_name == 'status'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=pending \
            -f context="${{ needs.setup.outputs.branch_name }}/functional-tests-full" \
            -f description="Running full functional tests..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.source_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pull image from Quay.io
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          FULL_IMAGE="quay.io/opendatahub/openvino_model_server:${IMAGE_TAG}"
          echo "Pulling image: ${FULL_IMAGE}"
          docker pull ${FULL_IMAGE}
          docker tag ${FULL_IMAGE} openvino/model_server:latest
      - name: Run full functional tests
        env:
          IMAGE: openvino/model_server:latest
        run: |
          make test_functional
      - name: Post success status to commit
        if: github.event_name == 'status' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=success \
            -f context="${{ needs.setup.outputs.branch_name }}/functional-tests-full" \
            -f description="Full functional tests passed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Post failure status to commit
        if: github.event_name == 'status' && failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.setup.outputs.source_ref }} \
            -f state=failure \
            -f context="${{ needs.setup.outputs.branch_name }}/functional-tests-full" \
            -f description="Full functional tests failed" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"